spring:
  application:
    name: literary-chinese-backend

server:
  port: 8080

---

spring:
  config:
    activate:
      on-profile: local

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

---

spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    org.springframework: INFO
    com.ellen: INFO
